    <script>
      // Force-remove max-height on profile image at runtime to ensure full visibility
      (function(){
        function fixProfileImg(){
          try{
            var imgs = document.querySelectorAll('.home-page .profile-preview img');
            imgs.forEach(function(img){
              img.style.setProperty('max-height','none','important');
              img.style.setProperty('height','auto','important');
              img.style.setProperty('min-height','300px','important');
            });
          }catch(e){/* ignore */}
        }
        // run immediately
        fixProfileImg();
        // also run on DOMContentLoaded and load
        document.addEventListener('DOMContentLoaded', fixProfileImg);
        window.addEventListener('load', fixProfileImg);
        // run a few times over the next second to catch SPA updates
        var runs = 0; const iv = setInterval(function(){ fixProfileImg(); runs++; if(runs>6) clearInterval(iv); }, 150);
      })();
    </script>
